[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[build.env]
NIXPACKS_PYTHON_VERSION = "3.11"

# Railway looks for this file in the root of what you point it to.
# When setting up Railway:
# 1. New Project → Deploy from GitHub → select your repo
# 2. In Railway project settings → set Root Directory to: backend
# 3. Add all your environment variables in the Variables tab
# 4. Railway will use this file automatically
